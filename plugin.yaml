name: agentiker-plan-follow
version: 0.5.31
description: "Hermes Plugin für strukturierte Plan-Erstellung, Task-Enforcement, Review-Gates, parallele Gruppen, Auto-Verify/Commit, Disk-Recovery, TTL-Cache, Validierung, Fälligkeit, Archivierung, Cross-Session Koordination, optionaler Git-Versionierung, Auto-Lock/Unlock, Auto-Peer-Review (run_peer_review nach plan_create), TTS-Event-Marker (plan_created, task_completed, review_failed) im Hook-Banner, Lock-Enforcement und cleanup_stale. Bietet 24 Tools, 2 Hooks, 7 Templates, Module-Split (tools/ Subpackage) und 600+ Tests."
author: "Johannes Lettner"
license: MIT
repo: https://git.ivory.green/johannes/agentiker-plan-follow-plugin
hooks:
  - pre_llm_call
  - post_tool_call
