name: plan_follow
version: 1.2.0
description: "Hermes Plugin für strukturierte Plan-Erstellung, Task-Enforcement, Review-Gates, parallele Gruppen, Auto-Verify/Commit, Disk-Recovery, TTL-Cache, Validierung, Fälligkeit, Archivierung, Cross-Session Koordination (plan_session/lock/notify), optionale Git-Versionierung (plan_history/git_init) und auto-review. Bietet 24 Tools, 2 Hooks, 7 Templates und 400+ Tests."
author: "Johannes Lettner"
license: MIT
repo: https://git.ivory.green/johannes/agentiker-plan-follow-plugin
hooks:
  - pre_llm_call
  - post_tool_call
