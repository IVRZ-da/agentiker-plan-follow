name: agentiker-plan-follow
version: 0.6.0
description: >
  Hermes Plugin für strukturierte Plan-Erstellung, Task-Enforcement und
  Multi-Session-Koordination via Kanban-Integration. Erzeugt Task-Graphen
  im Kanban-Board, managed Verify-Commands, Review-Gates und parallele
  Gruppen. Installiert automatisch Worker-Profile (plan-worker,
  plan-reviewer) und ein Dashboard "📋 Plans".
author: "Johannes Lettner"
license: MIT
repo: https://git.agentiker.de/johannes/agentiker-plan-follow
min_hermes_version: "0.16.0"
dependencies:
  - kanban_db  # Hermes Kanban-Kernel für Task-Management
hooks:
  - pre_llm_call
  - post_tool_call
  - on_session_end
setup:
  profiles:
    - plan-worker: "Führt Plan-Tasks aus (Implementierung, Tests)"
    - plan-reviewer: "Führt Code-Reviews durch"
  board: plans
  dashboard: true
