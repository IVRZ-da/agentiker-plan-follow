name: plan_follow
version: 1.3.0
description: "Hermes Plugin für strukturierte Plan-Erstellung, Task-Enforcement, Review-Gates, parallele Gruppen, Auto-Verify/Commit, Disk-Recovery, TTL-Cache, Validierung, Fälligkeit, Archivierung, Cross-Session Koordination (plan_session/lock/notify), optionale Git-Versionierung (plan_history/git_init), Auto-Lock/Unlock für Task-Files, Lock-Enforcement im Hook, cleanup_stale Automatisierung und zentrale Session-ID. Bietet 24 Tools, 2 Hooks, 7 Templates und 430+ Tests."
author: "Johannes Lettner"
license: MIT
repo: https://git.ivory.green/johannes/agentiker-plan-follow-plugin
hooks:
  - pre_llm_call
  - post_tool_call
