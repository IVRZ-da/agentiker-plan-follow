name: Plan Follow CI
on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: plan_follow
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install dependencies
        working-directory: plan_follow
        run: |
          pip install pytest
      - name: Run tests
        working-directory: plan_follow
        run: |
          python -m pytest tests/ -v --tb=short
