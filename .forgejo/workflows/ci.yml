name: Plan Follow CI
on:
  push:
  pull_request:

jobs:
  test:
    runs-on: python-test
    steps:
      - uses: actions/checkout@v4
        with:
          path: plan_follow
      - name: Install system dependencies
        run: |
          apt-get update -qq && apt-get install -y -qq git 2>/dev/null || true
      - name: Configure git
        run: |
          git config --global user.email "ci@ivory.green"
          git config --global user.name "CI Bot"
      - name: Create Hermes data dirs
        run: |
          mkdir -p ~/.hermes/{plans,shared,roadmaps}
      - name: Install dependencies
        run: |
          pip install hypothesis --break-system-packages -q 2>/dev/null || true
      - name: Run tests
        working-directory: plan_follow
        run: |
          python3 -m pytest tests/ -n auto -v --tb=short
