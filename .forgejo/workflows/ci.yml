name: Plan Follow CI
on:
  push:
  pull_request:

jobs:
  test:
    runs-on: python-test
    steps:
      - uses: actions/checkout@v4
        with:
          path: plan_follow
      - name: Run tests
        working-directory: plan_follow
        run: |
          python3 -m pytest tests/ -n auto -v --tb=short
